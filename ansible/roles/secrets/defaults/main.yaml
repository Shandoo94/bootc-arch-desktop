secrets_config:
  # Source paths (at build time)
  sops_config: "{{ playbook_dir }}/secrets/.sops.yaml"
  host_secrets: "{{ playbook_dir }}/secrets/host_secrets.yaml"
  global_secrets: "{{ playbook_dir }}/secrets/global_secrets.yaml"

  # Target paths (in container image)
  secrets_source_dir: "/usr/share/secrets"
  script_path: "/usr/local/bin/decrypt-secrets"

  # Runtime paths (used by script at boot)
  age_key_path: "/var/lib/sops/age/key.txt"
  runtime_secrets_dir: "/run/secrets"
  runtime_global_dir: "{{ runtime_secrets_dir }}/share"
  runtime_host_dir: "{{ runtime_secrets_dir }}/host"

  # Packages to install
  packages:
    - sops
    - yq

  # Symlink paths (optional)
  # Maps secret keys to filesystem paths where symlinks should be created
  # Example:
  #   paths:
  #     global:
  #       my.secret: /var/lib/app/secret
  #       user_pw.tiwaz: /etc/user/password
  #     atlas:  # hostname
  #       ssh_host_ed25519_key: /etc/ssh/ssh_host_ed25519_key
  paths:
    global: {}
