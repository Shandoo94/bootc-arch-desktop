---
# Validate that all secrets referenced in paths exist in the YAML files
# Note: We only need to check keys, not decrypt values

- name: Validate global secrets paths
  when: secrets_config.paths.global is defined
  block:
    - name: Read global secrets file (encrypted)
      ansible.builtin.slurp:
        src: "{{ secrets_config.global_secrets }}"
      register: secrets_global_content
      delegate_to: localhost
      tags: [secrets, validate]

    - name: Parse global secrets YAML (keys remain visible)
      ansible.builtin.set_fact:
        secrets_global_keys: "{{ secrets_global_content.content | b64decode | from_yaml }}"
      tags: [secrets, validate]

    - name: Validate global secret paths exist
      ansible.builtin.assert:
        that:
          - secrets_global_keys | json_query(secret_query) is not none
        fail_msg: "Secret '{{ item.key }}' referenced in paths.global does not exist in {{ secrets_config.global_secrets }}"
        success_msg: "Secret '{{ item.key }}' exists in global secrets"
      vars:
        # Convert dot notation to jmespath query
        secret_query: "{{ item.key }}"
      loop: "{{ secrets_config.paths.global | dict2items }}"
      tags: [secrets, validate]

- name: Validate host secrets paths
  when: secrets_config.paths[ansible_hostname] is defined
  block:
    - name: Read host secrets file (encrypted)
      ansible.builtin.slurp:
        src: "{{ secrets_config.host_secrets }}"
      register: secrets_host_content
      delegate_to: localhost
      tags: [secrets, validate]

    - name: Parse host secrets YAML (keys remain visible)
      ansible.builtin.set_fact:
        secrets_host_keys: "{{ secrets_host_content.content | b64decode | from_yaml }}"
      tags: [secrets, validate]

    - name: Validate host-specific secret paths exist
      ansible.builtin.assert:
        that:
          - secrets_host_keys | json_query(secret_query) is not none
        fail_msg: "Secret '{{ ansible_hostname }}.{{ item.key }}' does not exist in {{ secrets_config.host_secrets }}"
        success_msg: "Secret '{{ item.key }}' exists for host {{ ansible_hostname }}"
      vars:
        # Query includes hostname prefix for host-specific secrets
        secret_query: "{{ ansible_hostname }}.{{ item.key }}"
      loop: "{{ secrets_config.paths[ansible_hostname] | dict2items }}"
      tags: [secrets, validate]
