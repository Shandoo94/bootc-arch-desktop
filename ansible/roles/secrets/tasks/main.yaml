# Install required packages for SOPS secrets management
- name: Install SOPS and dependencies
  community.general.pacman:
    name: "{{ secrets_packages }}"
    state: present
  become: true
  tags: [secrets, packages]

# Create directory structure for encrypted secrets
- name: Create secrets source directory
  ansible.builtin.file:
    path: "{{ secrets_source_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [secrets]

# Copy encrypted secrets files to image
- name: Copy encrypted global secrets
  ansible.builtin.copy:
    src: "{{ secrets_global }}"
    dest: "{{ secrets_source_dir }}/global_secrets.yaml"
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [secrets]

- name: Copy encrypted host secrets
  ansible.builtin.copy:
    src: "{{ secrets_host }}"
    dest: "{{ secrets_source_dir }}/host_secrets.yaml"
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [secrets]

# Install decryption script
- name: Create directory for decryption script
  ansible.builtin.file:
    path: "{{ secrets_script_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [secrets]

- name: Install secrets decryption script
  ansible.builtin.template:
    src: decrypt-secrets.sh.j2
    dest: "{{ secrets_script_path }}"
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [secrets]

# Install and enable systemd services
- name: Create systemd system directory
  ansible.builtin.file:
    path: /usr/lib/systemd/system
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [secrets, systemd]

- name: Install sops-secrets systemd service
  ansible.builtin.copy:
    src: sops-secrets.service
    dest: /usr/lib/systemd/system/sops-secrets.service
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [secrets, systemd]

- name: Enable sops-secrets service
  ansible.builtin.systemd_service:
    name: sops-secrets.service
    enabled: true
  become: true
  tags: [secrets, systemd]

# Generate symlink configuration for global and host-specific secrets
- name: Read host secrets file to extract hostnames
  ansible.builtin.slurp:
    src: "{{ secrets_host }}"
  register: secrets_host_content
  delegate_to: localhost
  tags: [secrets, symlinks]

- name: Extract hostnames from host_secrets.yaml
  ansible.builtin.set_fact:
    secrets_hostnames: "{{ (secrets_host_content.content | b64decode | from_yaml).keys() | list }}"
  tags: [secrets, symlinks]

- name: Debug extracted hostnames
  ansible.builtin.debug:
    msg: "Hostnames in host_secrets.yaml: {{ secrets_hostnames }}"
  tags: [secrets, symlinks, debug]

- name: Check if any symlink paths are configured
  ansible.builtin.set_fact:
    secrets_has_symlink_paths: >-
      {{
        (secrets_paths.global is defined) or
        (secrets_hostnames | length > 0)
      }}
  tags: [secrets, symlinks, validate]

- name: Include path validation tasks
  ansible.builtin.include_tasks: validate_paths.yaml
  when: secrets_has_symlink_paths | bool
  tags: [secrets, symlinks, validate]

- name: Create tmpfiles.d directory for system-wide configs
  ansible.builtin.file:
    path: /usr/lib/tmpfiles.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when: secrets_has_symlink_paths | bool
  tags: [secrets, symlinks, tmpfiles]

- name: Generate global tmpfiles.d file for secret symlinks
  ansible.builtin.template:
    src: sops-secrets-global-symlinks.conf.j2
    dest: /usr/lib/tmpfiles.d/sops-secrets-global.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  when: secrets_paths.global is defined
  tags: [secrets, symlinks, tmpfiles]

- name: Create tmpfiles.d directory for host-specific configs
  ansible.builtin.file:
    path: "{{ secrets_source_dir }}/tmpfiles.d"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when: secrets_hostnames | length > 0
  tags: [secrets, symlinks, tmpfiles]

- name: Generate tmpfiles.d file for each host
  ansible.builtin.template:
    src: sops-secrets-host-symlinks.conf.j2
    dest: "{{ secrets_source_dir }}/tmpfiles.d/sops-secrets-{{ hostname }}.conf"
    owner: root
    group: root
    mode: "0644"
  become: true
  loop: "{{ secrets_hostnames }}"
  vars:
    hostname: "{{ item }}"
  when: secrets_paths[item] is defined
  tags: [secrets, symlinks, tmpfiles]

# Install and enable symlink creation service
- name: Install create-symlinks script
  ansible.builtin.template:
    src: create-symlinks.sh.j2
    dest: /usr/local/bin/create-symlinks
    owner: root
    group: root
    mode: "0755"
  become: true
  when: secrets_hostnames | length > 0
  tags: [secrets, systemd]

- name: Install sops-secrets-symlinks systemd service
  ansible.builtin.copy:
    src: sops-secrets-symlinks.service
    dest: /usr/lib/systemd/system/sops-secrets-symlinks.service
    owner: root
    group: root
    mode: "0644"
  become: true
  when: secrets_hostnames | length > 0
  tags: [secrets, systemd]

- name: Enable sops-secrets-symlinks service
  ansible.builtin.systemd_service:
    name: sops-secrets-symlinks.service
    enabled: true
  become: true
  when: secrets_hostnames | length > 0
  tags: [secrets, systemd]
