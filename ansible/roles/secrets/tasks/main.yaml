---
# Install required packages for SOPS secrets management
- name: Install SOPS and dependencies
  community.general.pacman:
    name: "{{ secrets_config.packages }}"
    state: present
  become: true
  tags: [secrets, packages]

# Create directory structure for encrypted secrets
- name: Create secrets source directory
  ansible.builtin.file:
    path: "{{ secrets_config.secrets_source_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [secrets]

# Copy encrypted secrets files to image
- name: Copy encrypted global secrets
  ansible.builtin.copy:
    src: "{{ secrets_config.global_secrets }}"
    dest: "{{ secrets_config.secrets_source_dir }}/global_secrets.yaml"
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [secrets]

- name: Copy encrypted host secrets
  ansible.builtin.copy:
    src: "{{ secrets_config.host_secrets }}"
    dest: "{{ secrets_config.secrets_source_dir }}/host_secrets.yaml"
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [secrets]

# Install decryption script
- name: Install secrets decryption script
  ansible.builtin.copy:
    src: decrypt-secrets.sh
    dest: "{{ secrets_config.script_path }}"
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [secrets]

# Install and enable systemd service
- name: Install sops-secrets systemd service
  ansible.builtin.copy:
    src: sops-secrets.service
    dest: /usr/lib/systemd/system/sops-secrets.service
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [secrets, systemd]

- name: Enable sops-secrets service
  ansible.builtin.systemd_service:
    name: sops-secrets.service
    enabled: true
    daemon_reload: true
  become: true
  tags: [secrets, systemd]
