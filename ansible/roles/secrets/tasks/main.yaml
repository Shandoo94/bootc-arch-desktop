# Debug: Show secrets_paths structure
- name: Debug check if hostname is in paths
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} in paths: {{ inventory_hostname in secrets_paths }}"
  tags: [always]

# Install required packages for SOPS secrets management
- name: Install SOPS and dependencies
  community.general.pacman:
    name: "{{ secrets_packages }}"
    state: present
  become: true
  tags: [secrets, packages]

# Create directory structure for encrypted secrets
- name: Create secrets source directory
  ansible.builtin.file:
    path: "{{ secrets_source_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [secrets]

# Copy encrypted secrets files to image
- name: Copy encrypted global secrets
  ansible.builtin.copy:
    src: "{{ secrets_global }}"
    dest: "{{ secrets_source_dir }}/global_secrets.yaml"
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [secrets]

- name: Copy encrypted host secrets
  ansible.builtin.copy:
    src: "{{ secrets_host }}"
    dest: "{{ secrets_source_dir }}/host_secrets.yaml"
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [secrets]

# Install decryption script
- name: Create directory for decryption script
  ansible.builtin.file:
    path: "{{ secrets_script_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [secrets]

- name: Install secrets decryption script
  ansible.builtin.template:
    src: decrypt-secrets.sh.j2
    dest: "{{ secrets_script_path }}"
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [secrets]

# Install and enable systemd service
- name: Create systemd system directory
  ansible.builtin.file:
    path: /usr/lib/systemd/system
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [secrets, systemd]

- name: Install sops-secrets systemd service
  ansible.builtin.copy:
    src: sops-secrets.service
    dest: /usr/lib/systemd/system/sops-secrets.service
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [secrets, systemd]

- name: Enable sops-secrets service
  ansible.builtin.systemd_service:
    name: sops-secrets.service
    enabled: true
  become: true
  tags: [secrets, systemd]

# Validate and generate symlink configuration (if paths are defined)
- name: Check if any symlink paths are configured
  ansible.builtin.set_fact:
    secrets_has_symlink_paths: >-
      {{
        (secrets_paths.global is defined) or
        (secrets_paths[inventory_hostname] is defined)
      }}
  tags: [secrets, symlinks, validate]

- name: Include path validation tasks
  ansible.builtin.include_tasks: validate_paths.yaml
  when: secrets_has_symlink_paths | bool
  tags: [secrets, symlinks, validate]

- name: Create tmpfiles.d directory
  ansible.builtin.file:
    path: /usr/lib/tmpfiles.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when: secrets_has_symlink_paths | bool
  tags: [secrets, symlinks, tmpfiles]

- name: Generate tmpfiles.d file for secret symlinks
  ansible.builtin.template:
    src: sops-secrets-symlinks.conf.j2
    dest: /usr/lib/tmpfiles.d/sops-secrets-symlinks.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  when: secrets_has_symlink_paths | bool
  tags: [secrets, symlinks, tmpfiles]
