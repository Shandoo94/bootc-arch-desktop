- name: Install network utils
  community.general.pacman:
    name:
      - networkmanager
      - tailscale
      - nftables
      - firewalld
  become: true
  tags: [network, packages]

- name: Activate nftables
  ansible.builtin.systemd_service:
    name: nftables.service
    enabled: true
  become: true
  tags: [network, firewall, systemd]

- name: Activate firewalld
  ansible.builtin.systemd_service:
    name: firewalld.service
    enabled: true
  become: true
  tags: [network, firewall, systemd]

- name: Activate network manager
  ansible.builtin.systemd_service:
    name: NetworkManager.service
    enabled: true
  become: true
  tags: [network, systemd]

- name: Activate tailscale
  ansible.builtin.systemd_service:
    name: tailscaled.service
    enabled: true
  become: true
  tags: [network, systemd]
