[bootc-arch-desktop-builder]
image=docker.io/archlinux/archlinux:latest
pull=true
init=true
nvidia=false
root=true

additional_packages="podman parted btrfs-progs e2fsprogs dosfstools util-linux"
additional_volumes="/dev:/dev /var/lib/containers:/var/lib/containers"

pre_init_hooks=pacman -Syu --noconfirm

entry=true
start_now=false
