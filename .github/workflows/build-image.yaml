name: build image

on:
  workflow_call:
    inputs:
      push:
        required: true
        type: boolean
      image_name:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain Versions
        run: |
          podman --version || true
          buildah --version || true

      # Based on https://github.com/orgs/community/discussions/25678
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache

      - name: Check Disk Usage
        run: |
          df -h /
          uname -m  # Bonus: Confirms x64 vs. aarch64

      - name: Generate build info
        id: version
        run: |
          BUILD_DATE=$(date +%Y%m%d)
          BUILD_NUMBER=${{ github.run_number }}
          HOSTNAMES=$(cat ansible/inventory/inventory.yaml | yq --raw-output '.all.hosts | keys[]' | tr '\n' ' ' | sed 's/ $//')
          echo "date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "hostnames=$HOSTNAMES" >> "$GITHUB_OUTPUT"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "namespace=$OWNER" >> "$GITHUB_OUTPUT"

      - name: Read base image ref
        id: base-image
        run: |
          BASE_IMAGE_REF=$(head -n1 base-image.lock | tr -d '[:space:]')
          echo "ref=$BASE_IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Generate Containerfiles
        run: |
          HOSTNAMES=${{ steps.base-image.outputs.hostnames }}
          BUILD_DATE="${{ steps.version.outputs.date }}"
          BUILD_NUMBER="${{ steps.version.outputs.number }}"
          GIT_SHA="${{ github.sha }}"
          BASE_IMAGE_REF="${{ steps.base-image.outputs.ref }}"
          for host in $HOSTNAMES; do
            echo "Generating Containerfile for host: $host"
            ./scripts/make-containerfile.sh "$host"
          done
          echo "Containerfiles generated for all hosts"

      - name: Scan repo for secrets
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "secret"
          exit-code: "1"

      - name: Log in to GHCR
        if: inputs.push
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ inputs.image_name }}
          tags: ${{ steps.version.outputs.version }} latest
          containerfiles: |
            ./Containerfile
          oci: true
          layers: false
          extra-args: |
            --pull-always

      - name: Push to GHCR
        if: inputs.push
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io/${{ steps.version.outputs.namespace }}
